<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body style="background:#111827; color:white;">

<h1>Admin Panel - All Threat Data</h1>

<table border="1" cellpadding="10">
<tr>
    <th>IP</th>
    <th>Threat</th>
    <th>Severity</th>
</tr>

{% for t in data %}
<tr>
    <td>{{ t.ip }}</td>
    <td>{{ t.threat_type }}</td>
    <td>{{ t.severity }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
