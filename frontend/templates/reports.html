<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background-color:#111827; color:white;">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center">
        <div id="downloadStatus" class="mt-2 text-success" style="display:none;">
    Report downloaded successfully ✔
</div>

        <h1>Threat Reports</h1>
        <a href="/download-report" class="btn btn-success mb-3">
        Download CSV Report
        </a>

        <a href="/" class="btn btn-primary">
            Dashboard
        </a>

    </div>


    <!-- STATS CARDS -->

    <div class="row mt-4">

        <!-- TOTAL -->
        <div class="col-md-4">
            <div class="card bg-danger text-white">
                <div class="card-body">
                    <h5>Total Threats</h5>
                    <h2 id="totalThreats">0</h2>
                </div>
            </div>
        </div>

        <!-- HIGH -->
        <div class="col-md-4">
            <div class="card bg-warning text-dark">
                <div class="card-body">
                    <h5>High Risk</h5>
                    <h2 id="highThreats">0</h2>
                </div>
            </div>
        </div>

        <!-- SAFE -->
        <div class="col-md-4">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h5>Safe Requests</h5>
                    <h2 id="safeRequests">0</h2>
                </div>
            </div>
        </div>

    </div>


    <!-- REPORT TABLE -->

    <div class="mt-5">

        <h3>Generated Reports</h3>

        <table class="table table-dark table-striped mt-3">

            <thead>
                <tr>
                    <th>Report Name</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="reportTable"></tbody>
                
            </tbody>

        </table>

    </div>

</div>


<!-- ========================= -->
<!-- SCRIPT -->
<!-- ========================= -->

<script>

async function loadReportStats() {
    try {
        const res = await fetch('/api/analytics');
        const data = await res.json();

        const high = data.high || 0;
        const safe = data.safe || 0;

        // ✅ Correct logic
        document.getElementById("totalThreats").innerText = high + safe;
        document.getElementById("highThreats").innerText = high;
        document.getElementById("safeRequests").innerText = safe;

    } catch (error) {
        console.error("Error loading report stats:", error);
    }
}

// INITIAL LOAD
window.onload = () => {
    loadReportStats();
    loadReports();
};

// AUTO REFRESH (every 5 sec)
setInterval(loadReportStats, 5000);

document.querySelector('a[href="/download-report"]').addEventListener('click', () => {
    const msg = document.getElementById("downloadStatus");
    msg.style.display = "block";

    setTimeout(() => {
        msg.style.display = "none";
    }, 3000);
});
async function loadReports() {

    let html = "";

    for (let i = 1; i <= 5; i++) {
        html += `
        <tr>
            <td>Threat Report ${i}</td>
            <td>${new Date().toISOString().split('T')[0]}</td>
            <td><span class="badge bg-success">Generated</span></td>
        </tr>`;
    }

    document.getElementById("reportTable").innerHTML = html;
}
</script>

</body>
</html>
