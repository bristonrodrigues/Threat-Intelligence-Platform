<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Threat Feed</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center">

        <h1>Live Threat Feed</h1>

        <a href="/" class="btn btn-primary">
            Dashboard
        </a>

    </div>


    <!-- LIVE THREAT TABLE -->

    <div class="mt-4">

        <table class="table table-dark table-striped">

            <thead>

                <tr>

                    <th>IP Address</th>

                    <th>Threat Type</th>

                    <th>Severity</th>

                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="threatTable">

            </tbody>

        </table>

    </div>


    <!-- LIVE STATS -->

    <div class="row mt-5">

        <div class="col-md-4">

            <div class="card bg-danger text-white">

                <div class="card-body">

                    <h5>Total Threats</h5>

                    <h2 id="totalThreats">
                        0
                    </h2>

                </div>

            </div>

        </div>


        <div class="col-md-4">

            <div class="card bg-warning text-dark">

                <div class="card-body">

                    <h5>High Risk</h5>

                    <h2 id="highRisk">
                        0
                    </h2>

                </div>

            </div>

        </div>


        <div class="col-md-4">

            <div class="card bg-success text-white">

                <div class="card-body">

                    <h5>Safe Requests</h5>

                    <h2 id="safeRequests">
                        0
                    </h2>

                </div>

            </div>

        </div>

    </div>


    <!-- LIVE CHART -->

    <div class="mt-5">

        <h3>Threat Analytics</h3>

        <canvas id="liveChart"></canvas>

    </div>

</div>


<script>

async function loadThreatFeed() {
    const res = await fetch('/api/threats');
    const data = await res.json();

    const table = document.getElementById("threatTable");
    table.innerHTML = "";

    data.forEach(t => {
        table.innerHTML += `
            <tr>
                <td>${t.ip}</td>
                <td>${t.threat_type}</td>
                <td>${t.severity}</td>
                <td>Active</td>
            </tr>
        `;
    });
}


// ==========================
// LOAD STATS
// ==========================
async function loadStats() {
    const res = await fetch('/api/analytics');
    const data = await res.json();

    document.getElementById("totalThreats").innerText =
        (data.high || 0) + (data.safe || 0);

    document.getElementById("highRisk").innerText =
        data.high || 0;

    document.getElementById("safeRequests").innerText =
        data.safe || 0;
}

let chart;

async function loadChart() {
    const res = await fetch('/api/analytics');
    const data = await res.json();

    const ctx = document.getElementById('liveChart').getContext('2d');

    if (chart) {
        chart.destroy();
    }

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['High Risk', 'Safe'],
            datasets: [{
                label: 'Threat Count',
                data: [data.high || 0, data.safe || 0],
                backgroundColor: ['#dc3545', '#28a745']
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    labels: { color: 'white' }
                }
            },
            scales: {
                x: {
                    ticks: { color: 'white' }
                },
                y: {
                    ticks: { color: 'white' }
                }
            }
        }
    });
}
// ==========================
// INITIAL LOAD
// ==========================
window.onload = function () {
    loadThreatFeed();
    loadStats();
    loadChart();   // ✅ ADD THIS
}

// ==========================
// AUTO REFRESH
// ==========================
setInterval(() => {
    loadThreatFeed();
    loadStats();
    loadChart();   // ✅ ADD THIS
}, 5000);
</script>

</body>

</html>
