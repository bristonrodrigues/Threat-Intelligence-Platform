<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Threat Analytics</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body style="background-color:#0f172a; color:white;">

<div class="container-fluid p-4">

    <!-- HEADER -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>

            Threat Analytics

        </h1>

        <a href="/" class="btn btn-primary">

            Dashboard

        </a>

    </div>


    <!-- TOP ROW -->

    <div class="row g-4">

        <!-- THREAT TYPES -->

        <div class="col-md-6">

            <div class="card bg-dark p-4 h-100">

                <h4 class="text-white mb-4">

                    Threat Types

                </h4>

                <canvas id="threatChart" style="max-height:300px;"></canvas>

            </div>

        </div>


        <!-- SEVERITY CHART -->

        <div class="col-md-6">

            <div class="card bg-dark p-4 h-100">

                <h4 class="text-white mb-4">

                    Severity Distribution

                </h4>

                <canvas id="severityChart" style="max-height:300px;"></canvas>

            </div>

        </div>

    </div>


    <!-- BOTTOM ROW -->

    <div class="row g-4 mt-1">

        <!-- LIVE THREAT FEED -->

        <div class="col-md-6">

            <div class="card bg-dark p-4 h-100">

                <h4 class="text-white mb-4">

                    Live Threat Feed

                </h4>


                <table class="table table-dark table-striped">

                    <thead>

                        <tr>

                            <th>Threat</th>

                            <th>Severity</th>

                        </tr>

                    </thead>

                    <tbody id="threatFeed">

                    </tbody>

                </table>

            </div>

        </div>


        <!-- SYSTEM STATS -->

        <div class="col-md-6">

            <div class="card bg-dark p-4 h-100">

                <h4 class="text-white mb-4">

                    System Statistics

                </h4>


                <div class="row text-center">

                    <div class="col-md-4">

                        <div class="card bg-primary p-3">

                            <h5>Total Scans</h5>

                            <h2 id="totalScans">

                                0

                            </h2>

                        </div>

                    </div>


                    <div class="col-md-4">

                        <div class="card bg-danger p-3">

                            <h5>High Threats</h5>

                            <h2 id="highCount">

                                0

                            </h2>

                        </div>

                    </div>


                    <div class="col-md-4">

                        <div class="card bg-success p-3">

                            <h5>Safe</h5>

                            <h2 id="safeCount">

                                0

                            </h2>

                        </div>

                    </div>

                </div>


                <div class="mt-4">

                    <h5 class="mb-3">

                        System Status

                    </h5>

                    <ul class="list-group">

                        <li class="list-group-item bg-dark text-white">

                            ML Model: Active
                        </li>

                        <li class="list-group-item bg-dark text-white">

                            MongoDB: Connected
                        </li>

                        <li class="list-group-item bg-dark text-white">

                            Alerts: Enabled
                        </li>

                        <li class="list-group-item bg-dark text-white">

                            API Status: Running
                        </li>

                    </ul>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

let trendChart;
let pieChart;

// =======================
// LOAD ANALYTICS
// =======================
async function loadAnalytics() {
    const res = await fetch('/api/analytics');
    const data = await res.json();

   document.getElementById("totalScans").innerText =
    (data.high || 0) + (data.safe || 0);

    document.getElementById("highCount").innerText =
    data.high || 0;

    document.getElementById("safeCount").innerText =
        data.safe || 0;
}


// =======================
// LOAD TREND CHART
// =======================
async function loadTrendChart() {
    const res = await fetch('/api/trend');
    const trend = await res.json();

    const ctx = document.getElementById('threatChart').getContext('2d');

    if (trendChart) trendChart.destroy();

    trendChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: trend.labels,
            datasets: [{
                label: 'Threat Activity',
                data: trend.data,
                borderColor: '#38bdf8',
                backgroundColor: 'rgba(56,189,248,0.1)',
                fill: true,
                tension: 0.4
            }]
        }
    });
}


// =======================
// LOAD PIE CHART
// =======================
async function loadPieChart() {
    const res = await fetch('/api/analytics');
    const data = await res.json();

    const ctx = document.getElementById('severityChart').getContext('2d');

    if (pieChart) pieChart.destroy();

    pieChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['High', 'Safe'],
            datasets: [{
                data: [data.high || 0, data.safe || 0],
                backgroundColor: ['#ef4444', '#22c55e']
            }]
        }
    });
}


// =======================
// LOAD TABLE
// =======================
async function loadThreatFeed() {
    const res = await fetch('/api/threats');
    const data = await res.json();

    let html = '';

    data.forEach(t => {
        html += `
            <tr>
                <td>${t.threat_type}</td>
                <td>${t.severity}</td>
            </tr>
        `;
    });

    document.getElementById('threatFeed').innerHTML = html;
}

// =======================
// INITIAL LOAD
// =======================
window.onload = function () {
    loadAnalytics();
    loadTrendChart();
    loadPieChart();
    loadThreatFeed();
}


// =======================
// AUTO REFRESH
// =======================
setInterval(() => {
    loadAnalytics();
    loadTrendChart();
    loadPieChart();
    loadThreatFeed();
}, 5000);

</script>
</body>

</html>
