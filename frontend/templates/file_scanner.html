<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>File Malware Scanner</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body style="background-color:#111827; color:white;">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card bg-dark text-white p-4">

                <h1 class="text-center mb-4">

                    Malware File Scanner

                </h1>


                <form
                    id="uploadForm"
                    enctype="multipart/form-data"
                >

                    <input
                        type="file"
                        id="fileInput"
                        class="form-control mb-3"
                    >


                    <button
                        type="button"
                        class="btn btn-danger w-100"
                        onclick="uploadFile()"
                    >

                        Scan File

                    </button>

                </form>


                <div id="resultBox" class="mt-4"></div>

            </div>

        </div>

    </div>

</div>


<script>

async function uploadFile() {

    const fileInput = document.getElementById(
        'fileInput'
    )

    const file = fileInput.files[0]


    const formData = new FormData()

    formData.append(
        'file',
        file
    )


    const response = await fetch(

        '/upload_file',

        {

            method: 'POST',

            body: formData
        }
    )


    const data = await response.json()


    document.getElementById(
        'resultBox'
    ).innerHTML = `

        <div class="card bg-secondary p-3 text-white">

            <h3>Scan Result</h3>

            <hr>

            <p>

                <strong>SHA256:</strong>

                ${data.sha256}

            </p>

            <p>

                <strong>Malicious:</strong>

                ${data.malicious}

            </p>

            <p>

                <strong>Suspicious:</strong>

                ${data.suspicious}

            </p>

            <p>

                <strong>Harmless:</strong>

                ${data.harmless}

            </p>

        </div>
    `
}

</script>

</body>

</html>
